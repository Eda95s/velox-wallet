name: AI Auto-Coder
on:
  issues:
    types: [opened]

jobs:
  ai-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Run AI Agent
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Этот скрипт будет отправлять задачу в Gemini и применять изменения
          npx -p @google/generative-ai -p @actions/github -p @actions/core -e '
            const { GoogleGenerativeAI } = require("@google/generative-ai");
            const fs = require("fs");
            const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const issueTitle = process.env.GITHUB_EVENT_ISSUE_TITLE;
            const prompt = `Ты - эксперт-программист. Исправь файлы проекта для задачи: ${issueTitle}. 
            Проанализируй файлы в репозитории и верни только код для изменений в формате:
            ### ФАЙЛ: имя_файла
            ```
            код
            ````;
            
            async function run() {
              const result = await model.generateContent(prompt);
              console.log(result.response.text());
              fs.writeFileSync("ai_solution.txt", result.response.text());
            }
            run();
          '
          git config user.name "AI Bot"
          git config user.email "bot@velox.wallet"
          git add ai_solution.txt
          git commit -m "AI generated solution for: ${{ github.event.issue.title }}"
          git push
