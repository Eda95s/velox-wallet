name: AI Auto-Coder
on:
  issues:
    types: [opened]

jobs:
  ai-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Ask Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Используем версию -latest, она самая стабильная для API
          curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=$GEMINI_API_KEY" \
          -H 'Content-Type: application/json' \
          -X POST \
          -d '{
            "contents": [{"parts":[{"text": "Привет! Напиши код для задачи: ${{ github.event.issue.title }}"}]}]
          }' > ai_solution.json

      - name: Push response
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add ai_solution.json
          git commit -m "Save response" || echo "No changes"
          git push
