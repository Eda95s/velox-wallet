name: AI Auto-Coder
on:
  issues:
    types: [opened]

jobs:
  ai-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Code
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Создаем простой текстовый файл для проверки связи
          echo "Бот получил задачу: ${{ github.event.issue.title }}" > ai_solution.md
          echo "---" >> ai_solution.md
          echo "Если ты видишь этот текст, значит Action работает!" >> ai_solution.md
      
      - name: Push solution
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add ai_solution.md
          git commit -m "Update from AI Bot"
          git push
