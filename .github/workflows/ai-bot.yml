name: AI Auto-Coder
on:
  issues:
    types: [opened]

jobs:
  ai-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Ask AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Используем другой формат запроса, чтобы точно получить текст
          curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
          -H 'Content-Type: application/json' \
          -X POST \
          -d '{
            "contents": [{"parts":[{"text": "Напиши код для задачи: ${{ github.event.issue.title }}. Ответь просто кодом."}]}]
          }' > response.json
          
          # Читаем ответ через python (он есть в окружении и надежнее, чем jq)
          python3 -c "import json; print(json.load(open('response.json'))['candidates'][0]['content']['parts'][0]['text'])" > ai_solution.md
      
      - name: Push
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add ai_solution.md
          git commit -m "AI update"
          git push
