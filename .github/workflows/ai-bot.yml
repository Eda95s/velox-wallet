name: List Models
on:
  workflow_dispatch:

jobs:
  list-models:
    runs-on: ubuntu-latest
    steps:
      - name: Get Available Models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Это официальный запрос списка моделей
          curl "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" > models_list.json
          cat models_list.json
